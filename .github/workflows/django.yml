name: Django CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11.7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv venv
          if [ "$OSTYPE" == "msys" ] || [ "$OSTYPE" == "win32" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          python -m pip install -r portfolio/requirements.txt

      - name: Set up Django environment and run migrations
        run: |
          source venv/bin/activate
          cd portfolio
          python manage.py migrate
        shell: bash

      - name: Collect static files
        run: |
          source venv/bin/activate
          cd portfolio
          python manage.py collectstatic --noinput
        shell: bash

      - name: Deploy to GitHub Pages
        run: |
          cd portfolio
          git checkout gh-pages
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -f static/
          git commit -m "Add static files for GitHub Pages deployment"
          git push --force --set-upstream origin_with_token gh-pages
          env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
